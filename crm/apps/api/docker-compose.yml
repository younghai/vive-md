services:
  postgres:
    image: postgres:16
    container_name: crm-postgres
    environment:
      POSTGRES_USER: crm
      POSTGRES_PASSWORD: crm
      POSTGRES_DB: crm
    ports:
      - "5432:5432"
    volumes:
      - crm-pg-data:/var/lib/postgresql/data

  api:
    image: node:22-alpine
    working_dir: /app
    volumes:
      - .:/app
    command: sh -c "npm install && npm run dev"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://crm:crm@postgres:5432/crm?schema=public
    ports:
      - "3001:3001"
    depends_on:
      - postgres

volumes:
  crm-pg-data:
